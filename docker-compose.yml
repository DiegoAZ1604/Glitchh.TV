services:
  php:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends unzip curl libonig-dev &&
        docker-php-ext-install mysqli &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        cd /var/www/html && composer install --no-interaction &&
        apache2-foreground
      "

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: login_data
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
